<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>CAD - Login</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            background: #dcdcdc;
            background-image: url("https://subtlepatterns.com/patterns/grey_wash_wall.png");
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 350px;
            background: #f7f7f7;
            border-radius: 6px;
            border: 1px solid #cfcfcf;
            box-shadow: 0 0 12px rgba(0,0,0,0.25);
        }

        .header {
            padding: 18px 24px;
            background: linear-gradient(#ffffff, #e6e6e6);
            border-bottom: 1px solid #d0d0d0;
            border-radius: 6px 6px 0 0;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #2b4c7e;
            text-shadow: 0 1px 0 #fff;
        }

        .logo span {
            color: #e67e22;
        }

        .subtitle {
            font-size: 12px;
            color: #777;
            margin-top: 4px;
        }

        .body {
            padding: 20px 24px;
        }

        label {
            font-size: 12px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 8px 9px;
            margin-top: 4px;
            margin-bottom: 14px;
            border-radius: 3px;
            border: 1px solid #bfbfbf;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
            font-size: 13px;
        }

        input:focus {
            border-color: #2b7cd3;
            box-shadow: 0 0 4px rgba(43,124,211,0.5);
            outline: none;
        }

        .remember {
            font-size: 12px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            width: 100%;
            padding: 9px 0;
            margin-top: 16px;
            background: linear-gradient(#3b8eea, #2b6fbd);
            border: 1px solid #1b5fa8;
            border-radius: 3px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.3);
            box-shadow: 0 2px 0 #1b4f88;
        }

        .btn:hover {
            background: linear-gradient(#4b9af0, #2f73c0);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #1b4f88;
        }

        .footer {
            padding: 12px;
            background: #f2f2f2;
            border-top: 1px solid #d0d0d0;
            border-radius: 0 0 6px 6px;
            font-size: 11px;
            text-align: center;
            color: #777;
        }

        .footer a {
            color: #2b6fbd;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-box">
        <div class="header">
            <div class="logo">CAD<span>.edu</span></div>
            <div class="subtitle">Plataforma de aprendizagem</div>
        </div>

        <form class="body">
            <label>Utilizador</label>
            <input type="text" name="user" autocomplete="off">

            <label>Palavra-passe</label>
            <input type="password" name="pass">

            <label class="remember">
                <input type="checkbox"> Manter sessão iniciada
            </label>

            <button class="btn">Entrar</button>
        </form>

        <div class="footer">
            © 2013 CAD Educação · <a href="#">Ajuda</a>
        </div>
    </div>
</div>
</body>
</html>
